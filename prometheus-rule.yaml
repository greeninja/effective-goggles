---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cert-expiry
  namespace: monitoring-tools
  labels:
    role: alert-rules
spec:
  groups:
    - name: certificate-alerts
      rules:
        - alert: SSLCertExpiringSoon
          expr: ((probe_ssl_earliest_cert_expiry - time()) / 86400) < 60
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "SSL Certificate for {{ $labels.instance }} expiring soon"
            description: "The SSL certificate for {{ $labels.instance }} is due to expire in {{ $value | printf \"%.1f\" }} days."

        - alert: SSLCertExpired
          expr: ((probe_ssl_earliest_cert_expiry - time()) / 86400) <= 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "SSL Certificate for {{ $labels.instance }} has EXPIRED"
            description: "The SSL certificate for {{ $labels.instance }} has already expired!"
